name: smart_farm
description: "Smart Farm AI — Production-ready Flutter application."
publish_to: none
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── UI ──────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg:     ^2.0.10+1
  fl_chart:        ^0.68.0

  # ── State management ────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Networking ───────────────────────────────────────────────────────────────
  http: ^1.2.1

  # ── Storage ──────────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.1

  # ── Image picking (AI model uploads) ────────────────────────────────────────
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/icons/
    - assets/images/logo/
